<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="100%" stop-color="#00aaff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#000000" rx="24" />
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#neonGlow)" stroke-width="4" stroke-opacity="0.3" filter="url(#glow)" />
  
  <!-- Inner stylized 'P' and 'F' combination or cyber cross -->
  <path d="M 35 25 L 65 25 A 15 15 0 0 1 65 55 L 48 55 L 48 75 L 35 75 Z" fill="url(#neonGlow)" filter="url(#glow)" />
  <circle cx="55" cy="50" r="6" fill="#ffffff" />
</svg>

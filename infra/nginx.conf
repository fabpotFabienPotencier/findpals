events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    upstream backend_api {
        server 127.0.0.1:8023;
    }

    # ── api.findpals.xyz ─────────────────────────────────────
    # Reverse proxy to NestJS backend (HTTP + WebSocket)
    server {
        listen 80;
        server_name api.findpals.xyz;

        # Redirect HTTP to HTTPS (once SSL is configured)
        # Uncomment after certbot setup:
        # return 301 https://$host$request_uri;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # CORS headers for frontend subdomains
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

        # Preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health check (no rate limit)
        location = /health {
            limit_req off;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket — Socket.io messaging namespace
        location /socket.io {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API routes
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Request body size limit (file uploads go to R2, so keep this small)
            client_max_body_size 2m;
        }
    }

    # ── SSL Server Block (uncomment after certbot setup) ─────
    # server {
    #     listen 443 ssl http2;
    #     server_name api.findpals.xyz;
    #
    #     ssl_certificate /etc/letsencrypt/live/api.findpals.xyz/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.findpals.xyz/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... copy all location blocks from above ...
    # }
}
